services:
  # Container do n8n
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n

  # Seu Robô Python (API)
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/app
    # Se api.py estiver dentro da pasta /app, use 'app.api:app'
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    depends_on:
      - n8n

volumes:
  n8n_data: